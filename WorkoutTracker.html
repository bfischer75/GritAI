const { useState, useEffect } = React;

const PROGRAM = {
  A: {
    label: "Day A",
    focus: "Push + Core",
    exercises: [
      { id: "lat_raise_a", name: "Side Lateral Raises", target: "Medial Delt", repRange: [12, 15], restType: "isolation", note: "Always first. Warms the rotator cuff." },
      { id: "incline_press", name: "Incline DB Press", target: "Upper Chest", repRange: [8, 12], restType: "compound", note: "Neutral grip. 3 sec descent. Shoulder: reduce ROM if pinching." },
      { id: "flat_press", name: "Flat DB Press", target: "Mid Chest", repRange: [8, 12], restType: "compound", note: "Neutral grip. Already warm — lighter WU loads." },
      { id: "ohp", name: "Seated DB Overhead Press", target: "Front Delt · Traps", repRange: [8, 10], restType: "compound", note: "Stop 10° short of lockout. Skip if shoulder flares." },
      { id: "ab_wheel_a", name: "Ab Wheel Rollout", target: "Core · Lats", repRange: [8, 12], restType: "core", note: "From knees. Extend only as far as lower back stays neutral." },
    ],
  },
  B: {
    label: "Day B",
    focus: "Pull + Hinge",
    exercises: [
      { id: "chinups", name: "Chin-ups", target: "Lats · Biceps", repRange: [0, 0], restType: "bodyweight", note: "Supinated grip. Work set = max reps to failure." },
      { id: "row", name: "Bilateral Bent-over Row", target: "Mid Back · Rhomboids", repRange: [8, 12], restType: "compound", note: "Lower back: brace every rep. Stop if lumbar takes over." },
      { id: "pullups", name: "Pull-ups", target: "Lats · Rear Delt", repRange: [0, 0], restType: "bodyweight", note: "Pronated grip. Work set = max reps to failure." },
      { id: "rdl_b", name: "Dumbbell RDL", target: "Hamstrings · Glutes", repRange: [10, 12], restType: "compound", note: "Hamstring stretch, not back stretch. Neutral spine throughout." },
      { id: "calf_b", name: "Calf Raise", target: "Gastrocnemius · Soleus", repRange: [15, 20], restType: "isolation", note: "Full range. Dead stretch at bottom." },
    ],
  },
  C: {
    label: "Day C",
    focus: "Legs + Full Body",
    exercises: [
      { id: "goblet_squat", name: "Heel-elevated Goblet Squat", target: "Quads · Glutes", repRange: [12, 15], restType: "compound", note: "Knees: track toes over knees. Depth = quad load without joint pain." },
      { id: "rdl_c", name: "Dumbbell RDL", target: "Hamstrings · Glutes", repRange: [12, 15], restType: "compound", note: "Slightly lighter than Day B. Quality over load." },
      { id: "row_c", name: "Bilateral Bent-over Row", target: "Mid Back", repRange: [10, 12], restType: "compound", note: "Second exposure. Lower load, focus on feel." },
      { id: "press_c", name: "Flat or Incline DB Press", target: "Chest", repRange: [10, 12], restType: "compound", note: "Whichever felt weaker this week." },
      { id: "calf_c", name: "Calf Raise", target: "Calves", repRange: [15, 20], restType: "isolation", note: "Second exposure. Reduce load if still sore from Day B." },
      { id: "ab_wheel_c", name: "Ab Wheel Rollout", target: "Core", repRange: [10, 15], restType: "core", note: "If lower back fatigued, sub with plank hold to failure." },
    ],
  },
};

const DAY_ORDER = ["A", "B", "C"];
const STORAGE_KEY = "hit_tracker_data";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { history: [], currentDay: "A" };
  } catch {
    return { history: [], currentDay: "A" };
  }
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function getLastEntry(history, exerciseId) {
  for (let i = history.length - 1; i >= 0; i--) {
    const ex = history[i].exercises?.find(e => e.id === exerciseId);
    if (ex) return ex;
  }
  return null;
}

function getTarget(exercise, last) {
  if (!last) return { weight: null, reps: exercise.repRange[0] || 8, isNew: true };
  const [lo, hi] = exercise.repRange;

  if (lo === 0 && hi === 0) {
    return { weight: "BW", reps: last.reps + 1, prevReps: last.reps, isNew: false };
  }

  if (last.reps >= hi && hi > 0) {
    return {
      weight: last.weight ? Number(last.weight) + 2.5 : 2.5,
      reps: lo,
      prevReps: last.reps,
      prevWeight: last.weight,
      isNew: false,
      addedWeight: true,
    };
  }

  return {
    weight: last.weight,
    reps: last.reps + 1,
    prevReps: last.reps,
    prevWeight: last.weight,
    isNew: false,
  };
}

function getRestGuide(exercise) {
  const type = exercise.restType || "compound";

  if (type === "isolation") {
    return {
      betweenWarmups: "45–60 sec",
      beforeWork: "1.5–2 min",
      cue: "Stay warm without fatiguing the muscle before the real set."
    };
  }

  if (type === "bodyweight") {
    return {
      betweenWarmups: "60–90 sec",
      beforeWork: "2–3 min",
      cue: "Let your breathing settle before the max-rep failure set."
    };
  }

  if (type === "core") {
    return {
      betweenWarmups: "45–75 sec",
      beforeWork: "1.5–2.5 min",
      cue: "Start the work set only when your brace feels strong."
    };
  }

  return {
    betweenWarmups: "60–90 sec",
    beforeWork: "3–4 min",
    cue: "The working set is the event — start it fresh, not rushed."
  };
}

function WorkoutTracker() {
  const initial = loadData();

  const [view, setView] = useState("workout");
  const [data, setData] = useState(initial);
  const [currentDay, setCurrentDay] = useState(initial.currentDay || "A");
  const [exIndex, setExIndex] = useState(0);
  const [logValues, setLogValues] = useState({});
  const [sessionExercises, setSessionExercises] = useState([]);
  const [sessionComplete, setSessionComplete] = useState(false);
  const [expandedSessions, setExpandedSessions] = useState({});

  const day = PROGRAM[currentDay];
  const exercises = day.exercises;
  const exercise = exercises[exIndex];
  const lastEntry = getLastEntry(data.history, exercise?.id);
  const target = exercise ? getTarget(exercise, lastEntry) : null;
  const restGuide = exercise ? getRestGuide(exercise) : null;
  const isBW = exercise && exercise.repRange[0] === 0 && exercise.repRange[1] === 0;
  const currentLog = logValues[exercise?.id] || { weight: "", reps: "" };

  useEffect(() => {
    saveData({ ...data, currentDay });
  }, [data, currentDay]);

  function setLog(field, val) {
    setLogValues(prev => ({
      ...prev,
      [exercise.id]: { ...prev[exercise.id], [field]: val }
    }));
  }

  function handleNext() {
    const logged = {
      id: exercise.id,
      name: exercise.name,
      weight: isBW ? "BW" : parseFloat(currentLog.weight) || target?.weight || 0,
      reps: parseInt(currentLog.reps, 10) || target?.reps || 0,
    };

    const updated = [...sessionExercises.filter(e => e.id !== exercise.id), logged];
    setSessionExercises(updated);

    if (exIndex < exercises.length - 1) {
      setExIndex(exIndex + 1);
      return;
    }

    const nextDay = DAY_ORDER[(DAY_ORDER.indexOf(currentDay) + 1) % DAY_ORDER.length];

    const session = {
      id: Date.now(),
      day: currentDay,
      dayLabel: day.label,
      date: new Date().toLocaleDateString("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      }),
      exercises: updated,
    };

    setData(d => ({ ...d, history: [...d.history, session], currentDay: nextDay }));
    setCurrentDay(nextDay);
    setSessionComplete(true);
  }

  function handlePrev() {
    if (exIndex > 0) setExIndex(exIndex - 1);
  }

  function startNewSession() {
    setExIndex(0);
    setLogValues({});
    setSessionExercises([]);
    setSessionComplete(false);
    setView("workout");
  }

  function changeDay(d) {
    setCurrentDay(d);
    setExIndex(0);
    setLogValues({});
    setSessionExercises([]);
    setSessionComplete(false);
  }

  function toggleSession(id) {
    setExpandedSessions(p => ({ ...p, [id]: !p[id] }));
  }

  function clearHistory() {
    if (confirm("Clear all history? This cannot be undone.")) {
      setData({ history: [], currentDay: "A" });
      setCurrentDay("A");
      setExIndex(0);
      setLogValues({});
      setSessionExercises([]);
      setSessionComplete(false);
    }
  }

  function warmupWeight(pct) {
    if (isBW) return pct === 50 ? "Band-assist" : "Bodyweight";
    const w = parseFloat(currentLog.weight) || target?.weight;
    if (!w || w === "BW") return `~${pct}% of working weight`;
    return `${Math.round((w * pct / 100) / 2.5) * 2.5} lbs`;
  }

  function renderHistory() {
    if (data.history.length === 0) {
      return (
        <div className="history-empty">
          No sessions logged yet.<br />
          Complete your first workout to see history here.
        </div>
      );
    }

    return (
      <>
        {[...data.history].reverse().map(session => (
          <div key={session.id} className="history-session">
            <div className="history-session-header" onClick={() => toggleSession(session.id)}>
              <div>
                <div className="history-day-title">{session.dayLabel} — {PROGRAM[session.day]?.focus}</div>
                <div className="history-date">{session.date}</div>
              </div>
              <div style={{ color: "var(--soft)", fontSize: "0.8rem" }}>
                {expandedSessions[session.id] ? "▲" : "▼"}
              </div>
            </div>

            {expandedSessions[session.id] && (
              <div className="history-exercises">
                {session.exercises.map(ex => (
                  <div key={ex.id} className="history-ex-row">
                    <div className="history-ex-name">{ex.name}</div>
                    <div className="history-ex-result">
                      {ex.weight === "BW" ? `BW × ${ex.reps}` : `${ex.weight} lb × ${ex.reps}`}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}

        <button className="clear-btn" onClick={clearHistory}>Clear all history</button>
      </>
    );
  }

  return (
    <>
      <style>{styles}</style>

      <div className="app">
        <div className="nav">
          <div className="nav-brand">HIT Tracker</div>
          <div className="nav-tabs">
            <button
              className={`nav-tab ${view === "workout" ? "active" : ""}`}
              onClick={() => setView("workout")}
            >
              Workout
            </button>
            <button
              className={`nav-tab ${view === "history" ? "active" : ""}`}
              onClick={() => setView("history")}
            >
              History
            </button>
          </div>
        </div>

        {view === "history" ? (
          <div className="history-wrap">{renderHistory()}</div>
        ) : sessionComplete ? (
          <div className="complete-screen">
            <div className="complete-icon">✓</div>
            <div className="complete-title">Session Done</div>
            <div className="complete-sub">
              That workout is in the books.<br />
              Recover well. Sleep is the real rep.
            </div>
            <div className="complete-next">
              Next session: <strong>{PROGRAM[currentDay].label} — {PROGRAM[currentDay].focus}</strong>
            </div>
            <button className="btn-new-session" onClick={startNewSession}>Start Next Session</button>
          </div>
        ) : (
          <>
            <div className="day-selector">
              <div className="kicker">Select Day</div>
              <div className="day-btns">
                {DAY_ORDER.map(d => (
                  <button
                    type="button"
                    key={d}
                    className={`day-btn ${currentDay === d ? "active" : ""}`}
                    onClick={() => changeDay(d)}
                  >
                    <span className="day-btn-title">{PROGRAM[d].label}</span>
                    <span className="day-btn-focus">{PROGRAM[d].focus}</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="ex-progress-bar">
              {exercises.map((_, i) => (
                <div
                  key={i}
                  className={`ex-pip ${i < exIndex ? "done" : i === exIndex ? "active" : ""}`}
                />
              ))}
            </div>

            <div className="ex-card">
              <div className="ex-counter">{exIndex + 1} of {exercises.length}</div>
              <div className="ex-name">{exercise.name}</div>
              <div className="ex-target">{exercise.target}</div>
              <div className="ex-note-box">{exercise.note}</div>

              <div className="warmup-section">
                <div className="section-label">Warm-up Sets</div>
                <div className="warmup-rows">
                  <div className="warmup-row">
                    <span className="warmup-badge">WU 1</span>
                    <span className="warmup-detail">
                      {warmupWeight(50)} · {isBW ? "6 easy reps" : "8–10 reps"}
                    </span>
                  </div>
                  <div className="warmup-row">
                    <span className="warmup-badge">WU 2</span>
                    <span className="warmup-detail">
                      {warmupWeight(75)} · {isBW ? "3–4 reps" : "4–6 reps"}
                    </span>
                  </div>
                </div>

                <div className="rest-guide">
                  <div className="rest-grid">
                    <div className="rest-item">
                      <div className="rest-label">WU1 → WU2</div>
                      <div className="rest-value">{restGuide.betweenWarmups}</div>
                    </div>
                    <div className="rest-item">
                      <div className="rest-label">WU2 → Work Set</div>
                      <div className="rest-value">{restGuide.beforeWork}</div>
                    </div>
                  </div>
                  <div className="rest-cue">{restGuide.cue}</div>
                </div>
              </div>

              <div className="target-box">
                <div className="target-label">Working Set Target</div>
                <div className="target-row">
                  {!isBW && (
                    <div className="target-stat">
                      <div className="target-val">{target.weight ?? "—"}</div>
                      <div className="target-unit">lbs</div>
                    </div>
                  )}

                  <div className="target-stat">
                    <div className="target-val">{isBW ? "MAX" : target.reps}</div>
                    <div className="target-unit">{isBW ? "reps to failure" : "reps target"}</div>
                  </div>

                  {target.prevReps !== undefined && (
                    <div className="target-prev">
                      Last: {target.prevWeight ? `${target.prevWeight} lb × ` : ""}{target.prevReps}
                    </div>
                  )}
                </div>

                {target.isNew && <div className="progression-badge">First time — start conservatively</div>}
                {target.addedWeight && <div className="progression-badge">↑ Weight added — you earned it</div>}
              </div>

              <div className="log-section">
                <div className="section-label">Log Your Working Set</div>
                <div className="input-row">
                  {!isBW ? (
                    <div className="input-group">
                      <div className="input-label">Weight (lbs)</div>
                      <input
                        className="log-input"
                        type="number"
                        step="2.5"
                        placeholder={target?.weight ?? "0"}
                        value={currentLog.weight}
                        onChange={e => setLog("weight", e.target.value)}
                      />
                    </div>
                  ) : (
                    <div className="input-group">
                      <div className="input-label">Weight</div>
                      <input className="log-input bw" value="Bodyweight" readOnly />
                    </div>
                  )}

                  <div className="input-group">
                    <div className="input-label">Reps Completed</div>
                    <input
                      className="log-input"
                      type="number"
                      placeholder={target?.reps ?? "0"}
                      value={currentLog.reps}
                      onChange={e => setLog("reps", e.target.value)}
                    />
                  </div>
                </div>
              </div>
            </div>

            <div className="btn-row">
              <button className="btn btn-prev" onClick={handlePrev} disabled={exIndex === 0}>
                ← Back
              </button>
              <button
                className={`btn ${exIndex === exercises.length - 1 ? "btn-finish" : "btn-next"}`}
                onClick={handleNext}
              >
                {exIndex === exercises.length - 1 ? "Finish Session" : "Next →"}
              </button>
            </div>
          </>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WorkoutTracker />);
</script>
</body>
</html>
